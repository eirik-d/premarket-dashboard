      --white: #FFFFFF;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'DM Sans', -apple-system, sans-serif; background: var(--white); color: var(--grey-6); line-height: 1.6; -webkit-font-smoothing: antialiased; }

    .header { background: var(--brown); color: var(--white); padding: 2rem 3rem 1.5rem; }
    .header-inner { max-width: 1360px; margin: 0 auto; display: flex; align-items: flex-end; justify-content: space-between; flex-wrap: wrap; gap: 1rem; }
    .header h1 { font-size: 1.5rem; font-weight: 700; letter-spacing: -0.02em; }
    .header .subtitle { color: var(--brown-2); font-size: 0.82rem; margin-top: 0.2rem; }
    .logo { font-size: 1.1rem; font-weight: 700; display: flex; align-items: center; gap: 0.5rem; }
    .logo-icon { width: 28px; height: 28px; background: var(--white); border-radius: 4px; display: flex; align-items: center; justify-content: center; }
    .logo-icon svg { width: 18px; height: 18px; }

    /* Region tabs */
    .region-tabs { display: flex; gap: 0; margin-top: 1rem; }
    .region-tab {
      padding: 0.5rem 1.25rem; font-size: 0.82rem; font-weight: 600;
      background: var(--brown-4); color: var(--brown-2); border: none; cursor: pointer;
      border-radius: 0; transition: all 0.15s;
    }
    .region-tab:first-child { border-radius: 6px 0 0 6px; }
    .region-tab:last-child { border-radius: 0 6px 6px 0; }
    .region-tab.active { background: var(--white); color: var(--brown); }
    .region-tab:hover:not(.active) { background: var(--brown-3); }

    .container { max-width: 1360px; margin: 0 auto; padding: 2rem 3rem; }
    .section-title { font-size: 1.15rem; font-weight: 700; color: var(--brown); margin-bottom: 1rem; padding-bottom: 0.4rem; border-bottom: 2px solid var(--brown-1); }

    .kpi-row { display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); gap: 0.75rem; margin-bottom: 2rem; }
    .kpi { background: var(--white); border-radius: 8px; padding: 1.25rem; border: 1px solid var(--grey); }
    .kpi .label { font-size: 0.65rem; text-transform: uppercase; letter-spacing: 0.08em; color: var(--grey-3); font-weight: 600; margin-bottom: 0.4rem; }
    .kpi .val { font-size: 2rem; font-weight: 700; line-height: 1; color: var(--brown); }
    .kpi .sub { font-size: 0.72rem; color: var(--grey-3); margin-top: 0.3rem; }
    .kpi.accent-green .val { color: var(--green); }
    .kpi.accent-blue .val { color: var(--blue-5); }
    .kpi.warn .val { color: #c2410c; }

    .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(420px, 1fr)); gap: 1.25rem; margin-bottom: 2rem; }
    .card { background: var(--white); border-radius: 8px; padding: 1.5rem; border: 1px solid var(--grey); }
    .card h2 { font-size: 0.85rem; font-weight: 700; color: var(--brown); margin-bottom: 1rem; }
    .card .desc { font-size: 0.78rem; color: var(--grey-3); margin-bottom: 1rem; }
    .chart-box { position: relative; width: 100%; height: 300px; }
    .chart-box.short { height: 220px; }

    .tbl { background: var(--white); border-radius: 8px; padding: 1.5rem; border: 1px solid var(--grey); margin-bottom: 2rem; overflow-x: auto; }
    .tbl h2 { font-size: 0.85rem; font-weight: 700; color: var(--brown); margin-bottom: 0.75rem; }
    table { width: 100%; border-collapse: collapse; font-size: 0.8rem; }
    th { text-align: left; padding: 0.5rem 0.6rem; border-bottom: 2px solid var(--grey); color: var(--grey-3); font-weight: 600; font-size: 0.65rem; text-transform: uppercase; letter-spacing: 0.06em; }
    th.r { text-align: right; }
    td { padding: 0.5rem 0.6rem; border-bottom: 1px solid var(--grey); }
    td.r { text-align: right; font-variant-numeric: tabular-nums; }
    tr:last-child td { border-bottom: none; }
    .agency-name { font-weight: 600; }

    .adopt-bar { display: flex; align-items: center; gap: 0.4rem; }
    .adopt-track { flex: 1; height: 6px; background: var(--grey); border-radius: 3px; overflow: hidden; min-width: 50px; }
    .adopt-fill { height: 100%; border-radius: 3px; }
    .badge { display: inline-block; padding: 0.1rem 0.4rem; border-radius: 4px; font-size: 0.65rem; font-weight: 600; }
    .badge-high { background: var(--green-1); color: var(--green-4); }
    .badge-low { background: var(--brown-1); color: var(--brown); }
    .badge-warn { background: #fff7ed; color: #c2410c; }

    /* Thermometer */
    .thermo-list { display: flex; flex-direction: column; gap: 0.35rem; margin-bottom: 2rem; }

    .thermo-rank { font-size: 0.65rem; font-weight: 700; color: var(--grey-3); min-width: 1.5rem; text-align: right; }
    .thermo-name { font-size: 0.8rem; font-weight: 600; color: var(--grey-6); min-width: 220px; max-width: 220px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .thermo-bar-wrap { flex: 1; display: flex; align-items: center; gap: 0.5rem; min-width: 0; }
    .thermo-track { flex: 1; height: 20px; background: var(--grey); border-radius: 10px; overflow: hidden; position: relative; }
    .thermo-fill { height: 100%; border-radius: 10px; transition: width 0.4s ease; position: relative; }
    .thermo-fill .thermo-marker { position: absolute; right: 0; top: -2px; bottom: -2px; width: 3px; background: rgba(0,0,0,0.2); border-radius: 1px; }
    .thermo-val { font-size: 0.78rem; font-weight: 700; min-width: 48px; text-align: right; font-variant-numeric: tabular-nums; }
    .thermo-meta { font-size: 0.65rem; color: var(--grey-3); min-width: 90px; text-align: right; }

    .thermo-row.warm { border-left: 3px solid #d97706; }
    .thermo-row.cool { border-left: 3px solid var(--green); }

    .footer { text-align: center; padding: 1.5rem; color: var(--grey-3); font-size: 0.72rem; border-top: 1px solid var(--grey); margin-top: 1rem; }

    @media (max-width: 900px) {

      .header h1 { font-size: 1.2rem; }
      .kpi-row { grid-template-columns: repeat(2, 1fr); }
      .kpi .val { font-size: 1.5rem; }
      .grid { grid-template-columns: 1fr; }
      .grid .card { min-width: 0; }
      .region-tabs { flex-wrap: wrap; }
      .region-tab { padding: 0.4rem 0.8rem; font-size: 0.75rem; }
      .thermo-name { min-width: 120px; max-width: 120px; font-size: 0.72rem; }
      .thermo-meta { display: none; }
      .thermo-row { padding: 0.4rem 0.5rem; gap: 0.4rem; }
      .tbl { padding: 0.75rem; }
      table { font-size: 0.7rem; }
      th, td { padding: 0.35rem 0.3rem; }
      .chart-box { height: 220px !important; }
      .adopt-track { min-width: 30px; }
    }

      .kpi { padding: 0.75rem; }
      .kpi .val { font-size: 1.3rem; }
      .kpi .label { font-size: 0.6rem; }
      .thermo-name { min-width: 90px; max-width: 90px; }
      .section-title { font-size: 1rem; }

    chartTrend: 'Dark period trend over time',
    chartTrendDesc: 'Overall avg delay Hjem → FINN (days), 3-day rolling average.',
    tblAgency: 'Full agency overview',
    tblDelay: 'Longest delays (Hjem before FINN)',
    thAgency: 'Agency chain',
    thFinn: 'FINN',
    thHjem: 'Hjem',
    thAdoption: 'Hjem adoption',
    thAddress: 'Address',
    thBroker: 'Broker',
    thDelay: 'Delay',
    thPrice: 'Price',
    thSize: 'Size',
    properties: 'properties',
    property: 'property',
    over48: 'over 48h',
    days: 'days',
    avgDays: 'Avg days',
    daysUnit: 'd',
    hoursUnit: 'h',
    propertiesThisDay: 'properties this day',
    tooltipDays: 'days',
    tooltipHours: 'hours',
    tooltipProperties: 'properties',
    avgDelay: 'Avg delay',
    daysAxis: 'Days',
    count: 'Count',
  }
};

function t(key) { return T[lang][key] || T['no'][key] || key; }

function destroyCharts() {
  charts.forEach(c => c.destroy());
  charts = [];
}

function fmt(n) { return n.toLocaleString('nb-NO'); }

function renderTabs() {
  const tabs = document.getElementById('regionTabs');
  tabs.innerHTML = REGIONS.map(r =>
    '<button class="region-tab' + (r.id === activeRegion ? ' active' : '') + '" data-region="' + r.id + '">' + r.name + '</button>'
  ).join('');
  tabs.querySelectorAll('.region-tab').forEach(btn => {
    btn.addEventListener('click', () => {
      activeRegion = btn.dataset.region;
      render();
    });
  });
}

document.getElementById('langToggle').addEventListener('click', () => {
  lang = lang === 'no' ? 'en' : 'no';
  document.getElementById('langToggle').textContent = lang === 'no' ? 'EN' : 'NO';
  render();
});

function render() {
  destroyCharts();
  renderTabs();
  document.getElementById('mainTitle').textContent = t('title');
  document.getElementById('mainSubtitle').textContent = t('subtitle');
  document.getElementById('mainFooter').textContent = t('footer').replace('{date}', '22.4.2026, 10:07:02');

  const d = DATA[activeRegion];
  if (!d) { document.getElementById('content').innerHTML = '<p>' + t('noData') + '</p>'; return; }

  const avgDelayHours = (d.avgDelay * 24).toFixed(1);
  const maxDelayHours = (d.maxDelay * 24).toFixed(1);
  const beyond24 = (d.buckets['24-48t'] || 0) + (d.buckets['48-72t'] || 0) + (d.buckets['72t+'] || 0);
  const beyondPct = d.delays.length > 0 ? ((beyond24 / d.delays.length) * 100).toFixed(0) : 0;

  const lowData = d.reliableDays < 7;
  document.getElementById('content').innerHTML = `
    ${lowData ? '<div style="background:#fff7ed;border:1px solid #fed7aa;border-radius:8px;padding:0.75rem 1.25rem;margin-bottom:1rem;font-size:0.82rem;color:#9a3412;"><strong>${t("limitedData")}</strong> ${t("limitedDataMsg").replace("{n}", d.reliableDays)}</div>' : ''}
    <!-- KPIs -->
    <div class="kpi-row">
      <div class="kpi">
        <div class="label">${t("kpiFinn")}</div>
        <div class="val">${fmt(d.finnTotal)}</div>
        <div class="sub">${t("activeListings")}</div>
      </div>
      <div class="kpi accent-green">
        <div class="label">${t("kpiHjem")}</div>
        <div class="val">${fmt(d.hjemTotal)}</div>
        <div class="sub">${d.finnTotal > 0 ? ((d.hjemTotal / d.finnTotal * 100).toFixed(0) + t("ofFinn")) : ''}</div>
      </div>
      <div class="kpi accent-blue">
        <div class="label">${t("kpiMatched")}</div>
        <div class="val">${fmt(d.matchCount)}</div>
        <div class="sub">${t("onBoth")}</div>
      </div>
      <div class="kpi">
        <div class="label">${t("kpiFirstHjem")}</div>
        <div class="val">${fmt(d.delays.length)}</div>
        <div class="sub">${t("measuredDelay")}</div>
      </div>
      <div class="kpi ${d.avgDelay > 1 ? 'warn' : 'accent-green'}">
        <div class="label">${t("kpiAvgDelay")}</div>
        <div class="val">${avgDelayHours}${t("hoursUnit")}</div>
        <div class="sub">${d.avgDelay > 1 ? t("over24limit") : t("within24")}</div>
      </div>
      <div class="kpi ${beyond24 > 0 ? 'warn' : ''}">
        <div class="label">${t("kpiOver24")}</div>
        <div class="val">${beyond24}</div>
        <div class="sub">${beyondPct}${t("ofDelayed")}</div>
      </div>
    </div>

    <!-- Charts row 1: Timeline + Delay distribution -->
    <h3 class="section-title">${t("sectionInventory")}</h3>
    <div class="grid">
      <div class="card">
        <h2>${t("chartTimeline")}</h2>
        <div class="chart-box"><canvas id="timelineChart"></canvas></div>
      </div>
      <div class="card">
        <h2>${t("chartBuckets")}</h2>
        <p class="desc">${t("chartBucketsDesc")}</p>
        <div class="chart-box"><canvas id="bucketChart"></canvas></div>
      </div>
    </div>

    <!-- Charts row 2: Per-agency delay + Agency inventory -->
    <h3 class="section-title">${t("sectionAgencies")}</h3>
    <div class="grid">
      <div class="card">
        <h2>${t("chartAgencyDelay")}</h2>
        <p class="desc">${t("chartAgencyDelayDesc")}</p>
        <div class="chart-box"><canvas id="agencyDelayChart"></canvas></div>
      </div>
      <div class="card">
        <h2>${t("chartInventory")}</h2>
        <div class="chart-box"><canvas id="agencyChart"></canvas></div>
      </div>
    </div>

    <!-- Office Thermometer -->
    ${d.officeThermometer && d.officeThermometer.length > 0 ? `
    <h3 class="section-title">${t("sectionThermo")}</h3>
    <p style="font-size:0.78rem;color:var(--grey-3);margin:-0.5rem 0 1rem;">${t("thermoDesc")}</p>
    <div class="thermo-list" id="thermoList"></div>
    ` : ''}

    <!-- Delay trend line chart -->
    ${d.delayTrend && d.delayTrend.dates.length > 2 ? `
    <div class="card" style="margin-bottom:2rem;">
      <h2>${t("chartTrend")}</h2>
      <p class="desc">${t("chartTrendDesc")}</p>
      <div class="chart-box" style="height:280px;"><canvas id="delayTrendChart"></canvas></div>
    </div>
    ` : ''}

    <!-- Agency table -->
    <div class="tbl">
      <h2>${t("tblAgency")}</h2>
      <table>
        <thead><tr>
          <th>${t("thAgency")}</th>
          <th class="r">${t("thFinn")}</th>
          <th class="r">${t("thHjem")}</th>
          <th style="min-width:160px">${t("thAdoption")}</th>
        </tr></thead>
        <tbody id="agencyTable"></tbody>
      </table>
    </div>

    <!-- Top delays table -->
    ${d.delays.length > 0 ? `
    <div class="tbl">
      <h2>${t("tblDelay")}</h2>
      <table>
        <thead><tr>
          <th>${t("thAddress")}</th>
          <th>${t("thBroker")}</th>
          <th class="r">${t("thDelay")}</th>
          <th class="r">${t("thPrice")}</th>
          <th class="r">${t("thSize")}</th>
        </tr></thead>
        <tbody id="delayTable"></tbody>
      </table>
    </div>
    ` : ''}
  `;

  // --- Render charts ---

  // Timeline
  if (d.timeline.length > 0) {
    const labels = d.timeline.map(r => {
      const dt = new Date(r.day);
      return dt.getDate() + '. ' + ['jan','feb','mar','apr','mai','jun','jul','aug','sep','okt','nov','des'][dt.getMonth()];
    });
    charts.push(new Chart(document.getElementById('timelineChart'), {
      type: 'line',
      data: {
        labels,
        datasets: [
          { label: 'FINN.no', data: d.timeline.map(r => r.finn), borderColor: vBrown, backgroundColor: vBrown + '18', fill: true, tension: 0.3, pointRadius: 3, borderWidth: 2 },
          { label: 'Hjem.no', data: d.timeline.map(r => r.hjem), borderColor: vGreen, backgroundColor: vGreen + '18', fill: true, tension: 0.3, pointRadius: 3, borderWidth: 2 }
        ]
      },
      options: {
        responsive: true, maintainAspectRatio: false,
        interaction: { mode: 'index', intersect: false },
        plugins: { legend: { position: 'top', labels: { usePointStyle: true, pointStyle: 'circle', padding: 16 } } },
        scales: {
          x: { grid: { color: '#E5E5EA' }, ticks: { maxTicksLimit: 10 } },
          y: { beginAtZero: false, grid: { color: '#E5E5EA' }, ticks: { callback: v => v.toLocaleString('nb-NO') } }
        }
      }
    }));
  }

  // Delay buckets
  const bucketLabels = Object.keys(d.buckets);
  const bucketValues = Object.values(d.buckets);
  charts.push(new Chart(document.getElementById('bucketChart'), {
    type: 'bar',
    data: {
      labels: bucketLabels,
      datasets: [{
        label: t('count'),
        data: bucketValues,
        backgroundColor: bucketLabels.map((_, i) => i < 2 ? vGreen : i < 3 ? vOrange : vBrown),
        borderRadius: 4, barPercentage: 0.6
      }]
    },
    options: {
      responsive: true, maintainAspectRatio: false,
      plugins: { legend: { display: false } },
      scales: {
        x: { grid: { display: false } },
        y: { beginAtZero: true, grid: { color: '#E5E5EA' } }
      }
    }
  }));

  // Per-agency delay
  if (d.agencyStats.length > 0) {
    charts.push(new Chart(document.getElementById('agencyDelayChart'), {
      type: 'bar',
      data: {
        labels: d.agencyStats.map(a => a.name.length > 20 ? a.name.substring(0, 18) + '...' : a.name),
        datasets: [{
          label: t('avgDays'),
          data: d.agencyStats.map(a => +a.avgDelay.toFixed(2)),
          backgroundColor: d.agencyStats.map(a => a.avgDelay > 1 ? vOrange : vGreen),
          borderRadius: 4, barPercentage: 0.6
        }]
      },
      options: {
        indexAxis: 'y', responsive: true, maintainAspectRatio: false,
        plugins: {
          legend: { display: false },
          tooltip: { callbacks: { label: ctx => ctx.raw + ' ' + t('tooltipDays') + ' (' + d.agencyStats[ctx.dataIndex].count + ' ' + t('tooltipProperties') + ')' } }
        },
        scales: {
          x: { beginAtZero: true, grid: { color: '#E5E5EA' }, ticks: { callback: v => v + t('daysUnit') } },
          y: { grid: { display: false }, ticks: { font: { size: 11, weight: 600 } } }
        }
      }
    }));
  }

  // Agency inventory
  if (d.topAgencies.length > 0) {
    const top = d.topAgencies.slice(0, 10);
    charts.push(new Chart(document.getElementById('agencyChart'), {
      type: 'bar',
      data: {
        labels: top.map(a => a.name.length > 20 ? a.name.substring(0, 18) + '...' : a.name),
        datasets: [
          { label: 'FINN.no', data: top.map(a => a.finn), backgroundColor: vBrown, borderRadius: 3, barPercentage: 0.7 },
          { label: 'Hjem.no', data: top.map(a => a.hjem), backgroundColor: vGreen, borderRadius: 3, barPercentage: 0.7 }
        ]
      },
      options: {
        indexAxis: 'y', responsive: true, maintainAspectRatio: false,
        plugins: { legend: { position: 'top', labels: { usePointStyle: true, pointStyle: 'rectRounded', padding: 16 } } },
        scales: {
          x: { beginAtZero: true, grid: { color: '#E5E5EA' } },
          y: { grid: { display: false }, ticks: { font: { size: 11, weight: 600 } } }
        }
      }
    }));
  }

  // Agency table
  const tbody = document.getElementById('agencyTable');
  if (tbody) {
    tbody.innerHTML = d.topAgencies.map(a => {
      const adopt = a.finn > 0 ? Math.round(a.hjem / a.finn * 100) : 0;
      const color = adopt >= 80 ? vGreen : adopt >= 40 ? vBlue : vBrown3;
      const badgeClass = adopt >= 80 ? 'badge-high' : adopt >= 40 ? '' : 'badge-low';
      return '<tr>' +
        '<td class="agency-name">' + a.name + '</td>' +
        '<td class="r">' + a.finn + '</td>' +
        '<td class="r">' + a.hjem + '</td>' +
        '<td><div class="adopt-bar"><div class="adopt-track"><div class="adopt-fill" style="width:' + Math.min(adopt, 100) + '%;background:' + color + '"></div></div><span class="badge ' + badgeClass + '">' + adopt + '%</span></div></td>' +
        '</tr>';
    }).join('');
  }

  // Office thermometer
  const thermoEl = document.getElementById('thermoList');
  if (thermoEl && d.officeThermometer) {
    const maxAvg = Math.max(...d.officeThermometer.map(o => o.avgDelay), 1);
    thermoEl.innerHTML = d.officeThermometer.map((o, i) => {
      const avgH = (o.avgDelay * 24).toFixed(1);
      const avgD = o.avgDelay.toFixed(1);
      const pct = Math.min((o.avgDelay / maxAvg) * 100, 100);
      // Color: hot (>2d), warm (>1d), cool (<1d)
      const tier = o.avgDelay >= 2 ? 'hot' : o.avgDelay >= 1 ? 'warm' : 'cool';
      const barColor = tier === 'hot' ? '#c2410c' : tier === 'warm' ? '#d97706' : vGreen;
      const label = o.avgDelay >= 1 ? avgD + t('daysUnit') : avgH + t('hoursUnit');
      const meta = o.count + ' ' + (o.count > 1 ? t('properties') : t('property')) + (o.over48h > 0 ? ' · ' + o.over48h + ' ' + t('over48') : '');
      return '<div class="thermo-row ' + tier + '">' +
        '<span class="thermo-rank">' + (i + 1) + '</span>' +
        '<span class="thermo-name" title="' + o.name + '">' + o.name + '</span>' +
        '<div class="thermo-bar-wrap">' +
          '<div class="thermo-track"><div class="thermo-fill" style="width:' + pct + '%;background:' + barColor + '"><div class="thermo-marker"></div></div></div>' +
          '<span class="thermo-val" style="color:' + barColor + '">' + label + '</span>' +
        '</div>' +
        '<span class="thermo-meta">' + meta + '</span>' +
      '</div>';
    }).join('');
  }

  // Delay trend line chart — single overall average
  const trendCanvas = document.getElementById('delayTrendChart');
  if (trendCanvas && d.delayTrend && d.delayTrend.dates.length > 2) {
    const trendLabels = d.delayTrend.dates.map(dt => {
      const p = new Date(dt);
      return p.getDate() + '. ' + ['jan','feb','mar','apr','mai','jun','jul','aug','sep','okt','nov','des'][p.getMonth()];
    });
    charts.push(new Chart(trendCanvas, {
      type: 'line',
      data: {
        labels: trendLabels,
        datasets: [{
          label: t('avgDelay'),
          data: d.delayTrend.data,
          borderColor: vBrown,
          backgroundColor: vBrown + '18',
          fill: true,
          borderWidth: 2.5,
          tension: 0.3,
          pointRadius: 4,
          pointBackgroundColor: d.delayTrend.data.map(v => v >= 2 ? vOrange : v >= 1 ? '#d97706' : vGreen)
        }]
      },
      options: {
        responsive: true, maintainAspectRatio: false,
        plugins: {
          legend: { display: false },
          tooltip: { callbacks: {
            label: ctx => ctx.raw.toFixed(2) + ' ' + t('tooltipDays') + ' (' + (ctx.raw * 24).toFixed(1) + ' ' + t('tooltipHours') + ')',
            afterLabel: ctx => d.delayTrend.counts[ctx.dataIndex] + ' ' + t('propertiesThisDay')
          }}
        },
        scales: {
          x: { grid: { color: '#E5E5EA' }, ticks: { maxTicksLimit: 14 } },
          y: { beginAtZero: true, grid: { color: '#E5E5EA' }, title: { display: true, text: t('daysAxis'), font: { size: 11 } }, ticks: { callback: v => v + t('daysUnit') } }
        }
      }
    }));
  }

  // Delay table
  const dtbody = document.getElementById('delayTable');
  if (dtbody) {
    const topDelays = d.delays.sort((a, b) => b.delayDays - a.delayDays).slice(0, 15);
    dtbody.innerHTML = topDelays.map(dl => {
      const hours = (dl.delayDays * 24).toFixed(1);
      const badgeClass = dl.delayDays > 2 ? 'badge-warn' : dl.delayDays > 1 ? 'badge-low' : 'badge-high';
      return '<tr>' +
        '<td>' + (dl.location || dl.title?.substring(0, 40)) + '</td>' +
        '<td class="agency-name">' + (dl.agency || '') + '</td>' +
        '<td class="r"><span class="badge ' + badgeClass + '">' + hours + 't' + (dl.hjemOnly ? ' *' : '') + '</span></td>' +
        '<td class="r">' + (dl.price ? Number(dl.price).toLocaleString('nb-NO') + ' kr' : '') + '</td>' +
        '<td class="r">' + (dl.size || '') + ' m²</td>' +
        '</tr>';
    }).join('');
  }
}

render();
</script>
</body>
</html>
